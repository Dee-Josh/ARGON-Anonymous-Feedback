<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARGON Anonymous Feedback</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="page-wrap">
  <div class="argon-shell">
    <div class="argon-header">
      <div class="argon-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="#7CC576" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22c4-2 7-6 7-12V5l-7-3-7 3v5c0 6 3 10 7 12z" stroke="none" fill="none"/>
          <path d="M12 21s6-3 6-10V5l-6-2-6 2v6c0 7 6 10 6 10z"/>
        </svg>
      </div>
      <div>
        <p class="argon-title">ARGON Anonymous Feedback</p>
        <p class="argon-subtitle">Share honestly. No names, no logins.</p>
      </div>
    </div>

    <div class="argon-daybar" id="dayBar"></div>
    <div class="argon-status" id="statusLine"></div>

    <div class="argon-feed" id="feed">
      <div class="argon-empty" id="emptyState">Loading messages...</div>
    </div>

    <div class="argon-composer">
      <textarea id="msgInput" class="argon-input" placeholder="Type your anonymous message..." rows="1" maxlength="1000"></textarea>
      <button class="argon-send" id="sendBtn" aria-label="Send message">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <p class="argon-footnote">Messages are public and anonymous. No identifying info is stored or shown.</p>
  </div>
</div>
<script src="./app.js"></script>
</body>
</html>
